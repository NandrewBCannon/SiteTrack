<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SiteTrack Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        color: #17202a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100% - 32px));
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(23, 32, 42, 0.12);
      }
      img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="SiteTrack" />
      <h1>You are offline</h1>
      <p>Reconnect to load live workspace data, photos, maps, and job-site changes.</p>
    </main>
  </body>
</html>
